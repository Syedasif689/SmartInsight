{% extends "base.html" %}

{% block content %}
<div class="otp-container">
  <div class="otp-box">

    {% if error %}
      <div class="error-box">
        <h2>Authentication Error</h2>
        <p>{{ error }}</p>
        {% if error_detail %}
          <small>{{ error_detail }}</small>
        {% endif %}
        <a href="{{ url_for('dashboard.index') }}">Return to login</a>
      </div>
    {% else %}
      <h2>OTP Verification</h2>
      <p>Enter the verification code sent to your email</p>

      <form method="POST">
        <input 
          type="text" 
          name="otp" 
          placeholder="Enter OTP"
          maxlength="6"
          pattern="[0-9]{6}"
          required
          autocomplete="one-time-code"
        >

        <button type="submit">Verify</button>
      </form>
    {% endif %}

  </div>
</div>
{% endblock %}
